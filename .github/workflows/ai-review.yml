name: AI Code Review (Gemini)
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: AI Reviewer (Gemini Engine)
        uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # เปลี่ยนมาใช้ Google AI Studio API Key
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          # ระบุ Model ที่ต้องการใช้
          openai_api_model: "gemini-1.5-flash"
          # ใส่ Prompt ภาษาไทยที่คุณต้องการ
          system_message: |
            คุณคือ Senior Full Stack Developer 
            ช่วยตรวจสอบ PR นี้เป็นภาษาไทย โดยเน้นเรื่อง:
            - ความปลอดภัย (Security)
            - ประสิทธิภาพของโค้ด (Performance)
            - ความถูกต้องของ Logic และ Clean Code