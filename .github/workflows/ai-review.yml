name: Gemini AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gemini Code Review
        uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ใส่ทั้งสองช่องด้วย Key ของ Gemini ไปเลยครับ (หลอกระบบ)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} 
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          # บังคับใช้ Model ของ Google
          openai_api_model: "gemini-1.5-pro"
          # ปิดฟีเจอร์บางอย่างที่อาจจะเรียกหา OpenAI Library
          enable_summary: true
          enable_review: true
          system_message: |
            คุณคือ Senior Developer ช่วยรีวิวโค้ดเป็นภาษาไทย 
            เน้นตรวจสอบ Logic, Security และ Clean Code