name: Gemini AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gemini Code Review
        uses: google-gemini/ai-pr-reviewer@main # หรือ version ล่าสุดใน Marketplace
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # คุณสามารถใส่ Prompt ภาษาไทยตรงนี้ได้เลย
          system_message: |
            คุณคือ Senior Engineer 
            - รีวิวโค้ดอย่างละเอียดและสุภาพเป็นภาษาไทย
            - เน้นเรื่อง Performance, Security และ Clean Code
            - หากมีจุดที่ต้องแก้ไข ให้แสดงตัวอย่างโค้ดที่ถูกต้องด้วย
          model: "gemini-1.5-flash" # หรือ gemini-1.5-flash เพื่อความรวดเร็ว