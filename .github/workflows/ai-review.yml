name: Gemini AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gemini PR Reviewer
        # ใช้ Action ที่รองรับ Gemini โดยตรง ไม่ผ่าน OpenAI Library
        uses: sshnaidm/gemini-code-review-action@v2 
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          model: "gemini-3.1-pro-preview" # หรือใช้ gemini-1.5-flash เพื่อความเร็ว
          prompt: |
            คุณคือ Senior Full Stack Developer 
            ช่วยรีวิวโค้ดใน Pull Request นี้เป็นภาษาไทย
            - เน้นตรวจเรื่อง Security และ Performance
            - ถ้าเจอจุดที่ควรแก้ ให้แสดงตัวอย่างโค้ดที่ถูกต้อง
            - ไม่ต้องตรวจเรื่อง formatting (เช่น space/tab)